name: Build

permissions:
  contents: write
  actions: read
  checks: read

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frida agent (TypeScript)
        shell: pwsh
        run: |
          cd agent
          npm install 2>&1
          if ($LASTEXITCODE -ne 0) { throw "npm install failed" }
          npm run build 2>&1
          if ($LASTEXITCODE -ne 0) { throw "npm run build failed" }
          if (-not (Test-Path _.js)) { throw "_.js was NOT created!" }
          Write-Host "✅ _.js created: $((Get-Item _.js).Length / 1KB) KB"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install frida-tools pyinstaller

      - name: Package exe
        run: |
          pyinstaller --onefile --name "MD-Replay-Editor-fix" --add-data "agent;agent" main.py
          dir dist\*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MD-Replay-Editor-fix
          path: dist\MD-Replay-Editor-fix.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          name: MD-Replay-Editor-fix ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          body: |
            ## MD-Replay-Editor-fix

            下载 exe，启动 Master Duel，运行，点 Attach 即可。
          files: dist\MD-Replay-Editor-fix.exe
