name: Build

permissions:
  contents: write

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (only used for manual releases)"
        required: false
        default: ""

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Build Frida agent
        working-directory: agent
        run: |
          npm ci
          npm run build
          if (-not (Test-Path _.js)) { throw "agent/_.js was not created" }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Package portable EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name MD-Replay-Editor-fix `
            --icon "assets/app-icon.ico" `
            --add-data "agent/_.js;agent" `
            --add-data "assets/app-icon.png;assets" `
            --collect-all frida `
            main.py
          if (-not (Test-Path dist\MD-Replay-Editor-fix.exe)) { throw "EXE was not created" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MD-Replay-Editor-fix-windows
          path: dist/MD-Replay-Editor-fix.exe
          if-no-files-found: error

      - name: Create tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/MD-Replay-Editor-fix.exe

      - name: Create manual release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: dist/MD-Replay-Editor-fix.exe
