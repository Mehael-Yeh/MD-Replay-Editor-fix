name: Build and Release

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0-ci'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Setup Visual Studio C++ tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Download pinned BepInEx 6 IL2CPP (v6.0.0-pre.2)
      - name: Download BepInEx 6 IL2CPP
        shell: pwsh
        run: |
          $tag = "v6.0.0-pre.2"
          $ver = $tag -replace "^v", ""
          $beZip = "BepInEx-Unity.IL2CPP-win-x64-$ver.zip"
          $dlUrl = "https://github.com/BepInEx/BepInEx/releases/download/$tag/$beZip"
          Write-Host "Downloading: $dlUrl"
          Invoke-WebRequest $dlUrl -OutFile "$env:TEMP\$beZip" -UseBasicParsing
          Expand-Archive "$env:TEMP\$beZip" -DestinationPath "$env:TEMP\BepInEx" -Force
          Write-Host "BepInEx extracted. Core DLLs:"
          Get-ChildItem "$env:TEMP\BepInEx\BepInEx\core" -Filter "*.dll" | Select-Object Name

      # Build C# plugin
      - name: Build C# Plugin
        shell: cmd
        run: |
          set BEPINEX_DIR=%TEMP%\BepInEx\BepInEx\core
          dir "%BEPINEX_DIR%\BepInEx.Core.dll" 2>nul
          msbuild MD-Replay-Editor-fix.csproj /p:Configuration=Release /p:BEPINEX_DIR="%BEPINEX_DIR%" /p:Platform=x64 /t:Rebuild /v:m
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
          echo "=== Build output ==="
          dir bin\Release\*.dll

      # Build C++ loader
      - name: Build YgoMasterLoader (C++)
        shell: cmd
        run: |
          cd YgoMasterLoader
          cl YgoMasterLoader.cpp /LD /DWITHDETOURS /Fe:..\bin\Release\YgoMasterLoader.dll /EHsc /I. 2>&1
          cd ..
          echo "=== Loader output ==="
          dir bin\Release\YgoMasterLoader.dll

      # Package release ZIP
      - name: Package build artifacts
        shell: pwsh
        run: |
          $releaseDir = "MD-Replay-Editor-fix"
          New-Item -ItemType Directory -Force -Path $releaseDir
          Copy-Item "bin\Release\MD-Replay-Editor-fix.dll" -Destination "$releaseDir\" -ErrorAction SilentlyContinue
          Copy-Item "bin\Release\YgoMasterLoader.dll" -Destination "$releaseDir\" -ErrorAction SilentlyContinue
          Copy-Item "README.md" -Destination "$releaseDir\"
          Copy-Item "LICENSE" -Destination "$releaseDir\" -ErrorAction SilentlyContinue
          Write-Host "=== Package contents ==="
          Get-ChildItem $releaseDir -Recurse | Select-Object Name, Length
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "MD-Replay-Editor-fix.zip" -Force
          Write-Host "ZIP created: $((Get-Item 'MD-Replay-Editor-fix.zip').Length / 1KB) KB"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MD-Replay-Editor-fix
          path: |
            bin\Release\*.dll
            MD-Replay-Editor-fix.zip
          if-no-files-found: warn

      # Create GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          name: MD-Replay-Editor-fix ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          body: |
            ## MD-Replay-Editor-fix

            ### 包含
            - `MD-Replay-Editor-fix.dll` — BepInEx 6 IL2CPP 插件
            - `YgoMasterLoader.dll` — 原生 Hook DLL（需放在插件同目录）
            - `README.md` — 安装说明

            ### 安装
            1. 解压 `MD-Replay-Editor-fix.zip`
            2. 将两个 `.dll` 复制到 `BepInEx/plugins/`
            3. 通过 BepInEx 启动 Master Duel
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.event.inputs.version, '-') }}
          files: |
            MD-Replay-Editor-fix.zip
            bin\Release\MD-Replay-Editor-fix.dll
            bin\Release\YgoMasterLoader.dll
